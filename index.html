<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Υπολογισμός Επάθλων — Main Draw & Finals</title>
<meta name="description" content="Υπολογισμός επάθλων για κύριο ταμπλό 8 ή 12 ομάδων και finals." />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="mx-auto max-w-4xl px-6 py-10">
  <header class="mb-8">
    <h1 class="text-3xl font-bold tracking-tight">Υπολογισμός Επάθλων</h1>
    <p class="mt-2 text-sm text-slate-500">Κύριο ταμπλό (8 ή 12 ομάδες) ή Finals.</p>
  </header>

  <section class="grid gap-4 rounded-lg border border-slate-200 bg-white p-6 sm:grid-cols-2">
    <div>
      <label class="block text-sm font-medium">Format</label>
      <div id="fmtGroup" class="mt-2 inline-flex flex-wrap gap-1 rounded-md border border-slate-200 p-1"></div>
    </div>
    <div>
      <label class="block text-sm font-medium">Συνολικό Έπαθλο (€)</label>
      <input id="prize" type="number" value="2500" min="0" step="50"
        class="mt-2 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm" />
    </div>
  </section>

  <section class="mt-6 rounded-lg border border-slate-200 bg-white p-6">
    <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Ποσοστά ανά θέση</h2>
    <div id="groups" class="space-y-2"></div>
    <div id="totalPct" class="mt-4 text-sm text-slate-500"></div>
  </section>

  <section class="mt-6 overflow-hidden rounded-lg border border-slate-200 bg-white">
    <table class="w-full text-sm">
      <thead class="bg-slate-100 text-slate-500">
        <tr>
          <th class="px-4 py-2 text-left">Θέση</th>
          <th class="px-4 py-2 text-right">Ομάδα</th>
          <th class="px-4 py-2 text-right">Αθλητής</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </section>
<!--
  <div class="mt-6 flex justify-end">
    <button id="download" class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">
      Κατέβασμα JSON
    </button>
  </div> -->
</div>

<script>
const FORMAT_LABEL = { "8": "8 ομάδες", "12": "12 ομάδες", "finals": "Finals" };
const DEFAULTS = {
  "8": [
    { label: "1", positions: 1, percent: 30 },
    { label: "2", positions: 1, percent: 20 },
    { label: "3-4", positions: 2, percent: 12 },
    { label: "5-6", positions: 2, percent: 8 },
    { label: "7-8", positions: 2, percent: 5 },
  ],
  "12": [
    { label: "1", positions: 1, percent: 30 },
    { label: "2", positions: 1, percent: 20 },
    { label: "3-4", positions: 2, percent: 12 },
    { label: "5-8", positions: 4, percent: 6.5 },
  ],
  "finals": [
    { label: "1", positions: 1, percent: 30 },
    { label: "2", positions: 1, percent: 20 },
    { label: "3", positions: 1, percent: 14 },
    { label: "4", positions: 1, percent: 10 },
    { label: "5-6", positions: 2, percent: 8 },
    { label: "7-8", positions: 2, percent: 5 },
  ],
};

let state = { format: "8", prize: 2500, groups: JSON.parse(JSON.stringify(DEFAULTS)) };
const fmt = n => new Intl.NumberFormat("el-GR", { style: "currency", currency: "EUR", maximumFractionDigits: 2 }).format(n);

function renderFmt() {
  const g = document.getElementById("fmtGroup");
  g.innerHTML = "";
  Object.keys(FORMAT_LABEL).forEach(k => {
    const b = document.createElement("button");
    const on = k === state.format;
    b.className = "px-4 py-1.5 text-sm font-medium rounded " + (on ? "bg-slate-900 text-white" : "text-slate-500");
    b.textContent = FORMAT_LABEL[k];
    b.addEventListener("click", () => { state.format = k; render(); });
    g.appendChild(b);
  });
}

function render() {
  renderFmt();
  const active = state.groups[state.format];
  const gEl = document.getElementById("groups");
  gEl.innerHTML = "";
  active.forEach((g, i) => {
    const row = document.createElement("div");
    row.className = "flex items-center gap-3";
    row.innerHTML = `
      <span class="w-16 text-sm font-medium">${g.label}</span>
      <span class="w-24 text-xs text-slate-500">${g.positions} θέση(εις)</span>
      <input type="number" step="0.01" value="${g.percent}" class="w-28 rounded-md border border-slate-300 bg-white px-2 py-1 text-sm" />
      <span class="text-sm text-slate-500">% ανά θέση</span>
      <span class="ml-auto text-sm">${fmt((state.prize * g.percent) / 100)}</span>`;
    row.querySelector("input").addEventListener("input", e => {
      active[i].percent = Number(e.target.value) || 0;
      render();
    });
    gEl.appendChild(row);
  });
  const totalPct = active.reduce((s, g) => s + g.percent * g.positions, 0);
  const tp = document.getElementById("totalPct");
  tp.textContent = `Σύνολο ποσοστών: ${totalPct.toFixed(2)}%`;
  tp.className = "mt-4 text-sm " + (Math.abs(totalPct - 100) < 0.01 ? "text-slate-500" : "text-red-600");
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  let idx = 1, teamTotal = 0, athleteTotal = 0;
  for (const g of active) {
    for (let i = 0; i < g.positions; i++) {
      const team = (state.prize * g.percent) / 100;
      const athlete = team / 2;
      teamTotal += team; athleteTotal += athlete;
      const pos = g.positions === 1 ? String(idx) : i === 0 ? g.label : "";
      const tr = document.createElement("tr");
      tr.className = "border-t border-slate-200";
      tr.innerHTML = `<td class="px-4 py-2">${pos}</td><td class="px-4 py-2 text-right">${fmt(team)}</td><td class="px-4 py-2 text-right">${fmt(athlete)}</td>`;
      tbody.appendChild(tr);
      idx++;
    }
  }
  const tot = document.createElement("tr");
  tot.className = "border-t border-slate-200 bg-slate-100 font-semibold";
  tot.innerHTML = `<td class="px-4 py-2">Σύνολο</td><td class="px-4 py-2 text-right">${fmt(teamTotal)}</td><td class="px-4 py-2 text-right">${fmt(athleteTotal)}</td>`;
  tbody.appendChild(tot);
}

document.getElementById("prize").addEventListener("input", e => {
  state.prize = Number(e.target.value) || 0; render();
});
document.getElementById("download").addEventListener("click", () => {
  const active = state.groups[state.format];
  const rows = [];
  let idx = 1;
  for (const g of active) for (let i = 0; i < g.positions; i++) {
    const team = (state.prize * g.percent) / 100;
    rows.push({ pos: g.positions === 1 ? String(idx) : g.label + (i ? ` (#${i+1})` : ""), team, athlete: team / 2 });
    idx++;
  }
  const payload = { format: state.format, totalPrize: state.prize, groups: active, breakdown: rows, generatedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `epathla-${state.format}-${state.prize}eur.json`; a.click();
  URL.revokeObjectURL(url);
});

render();
</script>
</body>
</html>
